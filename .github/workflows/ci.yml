name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compute_matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.merge.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: graycoreio/github-actions-magento2/supported-version@v6.0.0
        id: magento
        with:
          kind: custom
          custom_versions: "magento/project-community-edition:2.4.7-p9,magento/project-community-edition:2.4.8-p4"
          include_services: true
      - uses: graycoreio/github-actions-magento2/supported-version@v6.0.0
        id: mageos
        with:
          kind: custom
          project: mage-os
          custom_versions: "mage-os/project-community-edition:2.2.0"
          include_services: true
      - name: Merge matrices
        id: merge
        run: |
          MERGED=$(jq -sc '{magento: (.[0].magento + .[1].magento), include: (.[0].include + .[1].include)}' <(echo '${{ steps.magento.outputs.matrix }}') <(echo '${{ steps.mageos.outputs.matrix }}'))
          echo "matrix=$MERGED" >> $GITHUB_OUTPUT

  check-extension:
    needs: compute_matrix
    uses: graycoreio/github-actions-magento2/.github/workflows/check-extension.yaml@v6.0.0
    with:
      matrix: ${{ needs.compute_matrix.outputs.matrix }}
      fail-fast: false

  phpstan:
    needs: compute_matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: graycoreio/github-actions-magento2/setup-magento@v6.0.0
        id: setup
        with:
          php-version: "8.3"
          mode: extension
      - name: Install extension
        working-directory: ${{ steps.setup.outputs.path }}
        run: |
          composer config repositories.local path $GITHUB_WORKSPACE
          composer require run-as-root/magento2-typesense:@dev --no-interaction
      - name: Run PHPStan
        working-directory: ${{ steps.setup.outputs.path }}
        run: vendor/bin/phpstan analyse -c $GITHUB_WORKSPACE/phpstan.neon
