name: E2E Tests

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', '*.md']
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**', '*.md']
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start Docker services
        working-directory: tests/e2e/docker
        run: docker compose up -d --build

      - name: Run Magento setup
        working-directory: tests/e2e/docker
        run: docker compose exec -T magento bash /var/www/html/typesense-extension/tests/e2e/docker/setup.sh
        timeout-minutes: 25

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: tests/e2e
        env:
          BASE_URL: http://localhost:8080
          ADMIN_URL: http://localhost:8080/admin/
          ADMIN_USER: admin
          ADMIN_PASSWORD: Admin12345!
        run: npx playwright test

      - name: Dump Magento logs on failure
        if: failure()
        working-directory: tests/e2e/docker
        run: |
          docker compose exec -T magento cat /var/www/html/var/log/exception.log 2>/dev/null | tail -100 || true
          docker compose exec -T magento cat /var/www/html/var/log/system.log 2>/dev/null | tail -50 || true
          echo "--- Apache error log ---"
          docker compose exec -T magento cat /var/log/apache2/error.log 2>/dev/null | tail -50 || true
          echo "--- Testing admin URL ---"
          docker compose exec -T magento curl -sI http://localhost/admin/ 2>/dev/null | head -10 || true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 14

      - name: Stop Docker services
        if: always()
        working-directory: tests/e2e/docker
        run: docker compose down -v
